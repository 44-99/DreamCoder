name: Bug report / 缺陷报告
description: Report a reproducible Web2DKit tool, Bridge, Skill, or adapter problem
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    id: boundary
    attributes:
      label: Affected boundary
      options:
        - MCP server or tool
        - Game Bridge
        - Codex plugin
        - Claude Code plugin
        - Agent Skill
        - Framework adapter
        - Documentation or installation
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected game or tool behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the seed, actions, assertions, and first failing step when available. Remove secrets and proprietary assets.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Structured output and diagnostics
      description: Paste the MCP error envelope, state subset, or runtime diagnostics. Screenshots alone are not sufficient for rule defects.
      render: json
  - type: input
    id: version
    attributes:
      label: Web2DKit version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Host, Node.js, OS, and game stack
      placeholder: Codex, Node 22.x, Windows 11, Phaser 3.x
    validations:
      required: true
