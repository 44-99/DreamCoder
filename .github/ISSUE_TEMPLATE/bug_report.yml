name: Bug report / 缺陷报告
description: Report a reproducible problem in DreamCoder / 报告可复现问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve DreamCoder. Please remove secrets from logs before submitting.
  - type: textarea
    id: description
    attributes:
      label: Problem / 问题描述
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction / 复现步骤
      placeholder: |
        1. Start ...
        2. Enter ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      description: Remove API keys, tokens, email addresses, and other private data.
      render: shell
  - type: input
    id: commit
    attributes:
      label: DreamCoder commit
      placeholder: git rev-parse --short HEAD
  - type: dropdown
    id: os
    attributes:
      label: Operating system / 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime versions / 运行时版本
      placeholder: Python 3.11.x, Node 22.x
  - type: input
    id: provider
    attributes:
      label: LLM provider and model
      placeholder: DeepSeek / deepseek-v4-flash
