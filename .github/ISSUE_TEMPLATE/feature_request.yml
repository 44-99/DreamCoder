name: Feature request / 功能建议
description: Propose a user problem DreamCoder could solve / 提议值得解决的问题
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem / 用户问题
      description: Describe the workflow or frustration, not only the desired implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome / 期望结果
      description: What should become possible, and how would we know it works?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 已考虑方案
  - type: dropdown
    id: area
    attributes:
      label: Area / 范围
      options:
        - Game generation workflow
        - Generated-code preview
        - Model provider
        - Local setup or deployment
        - Documentation or examples
        - Other
    validations:
      required: true
