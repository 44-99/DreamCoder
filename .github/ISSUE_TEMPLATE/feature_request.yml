name: Feature request / 功能建议
description: Propose a concrete Web 2D developer workflow improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Developer problem
      description: Describe the game-development task or failure, not only a desired technology.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current workaround
      description: How do you handle this with the coding agent, browser tools, or custom scripts today?
  - type: textarea
    id: outcome
    attributes:
      label: Verifiable outcome
      description: What state, action, assertion, trace, or scenario would prove the feature works?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Best-fit boundary
      options:
        - Game Bridge protocol
        - MCP tool
        - Agent Skill workflow
        - Framework adapter
        - Scenario and assertion format
        - Installation or distribution
        - Documentation
    validations:
      required: true
