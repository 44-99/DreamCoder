<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Orbit Dodge · DreamCoder</title>
  <style>
    :root { color-scheme:dark; font-family:Inter,ui-sans-serif,system-ui,sans-serif; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; color:#f5f7ff; background:radial-gradient(circle at 65% 5%,#273568,#111126 46%,#070812); }
    .shell { width:min(92vw,820px); }
    header { display:flex; align-items:end; justify-content:space-between; margin-bottom:16px; }
    h1 { margin:0; font-size:clamp(34px,7vw,58px); line-height:.88; letter-spacing:-.05em; }
    .label { margin-top:9px; color:#8da4ff; font-size:12px; font-weight:900; letter-spacing:.16em; text-transform:uppercase; }
    .time { text-align:right; color:#8490b3; font-size:12px; text-transform:uppercase; letter-spacing:.13em; }.time strong { display:block; color:#fff; font-size:34px; letter-spacing:0; }
    .stage { position:relative; padding:14px; border:1px solid #364a7d; border-radius:24px; background:#080a18; box-shadow:0 28px 90px #0009; }
    canvas { display:block; width:100%; aspect-ratio:4/3; border-radius:14px; background:#070916; }
    .overlay { position:absolute; inset:14px; display:grid; place-items:center; border-radius:14px; background:#080914df; text-align:center; }.overlay[hidden]{display:none}.overlay h2{margin:0;font-size:42px}.overlay p{color:#a4acc8}
    button{border:0;border-radius:999px;padding:12px 23px;color:#071027;background:#99adff;font-weight:900;cursor:pointer}.help{display:flex;justify-content:space-between;margin-top:14px;color:#818aa8;font-size:13px}a{color:#9fb2ff;text-decoration:none}
  </style>
</head>
<body>
  <main class="shell"><header><div><h1>Orbit<br>Dodge</h1><div class="label">DreamCoder example</div></div><div class="time">Survival<strong><span id="time">0.0</span>s</strong></div></header>
    <section class="stage"><canvas id="game" width="760" height="570" aria-label="Orbit Dodge game"></canvas><div class="overlay" id="overlay"><div><h2 id="title">Stay in orbit</h2><p id="message">WASD 或方向键移动，避开红色碎片。</p><button id="start">Start game</button></div></div></section>
    <div class="help"><span>WASD · Arrow keys</span><a href="../index.html">← Example gallery</a></div>
  </main>
  <script>
    const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d'),timeEl=document.querySelector('#time'),overlay=document.querySelector('#overlay'),titleEl=document.querySelector('#title'),messageEl=document.querySelector('#message'),startBtn=document.querySelector('#start');
    let player,rocks,stars,keys={},running=false,startTime,lastSpawn,raf;
    function reset(){player={x:380,y:285,r:11,speed:5};rocks=[];stars=Array.from({length:90},()=>({x:Math.random()*760,y:Math.random()*570,r:Math.random()*1.6+.3,a:Math.random()*.7+.2}));}
    function start(){cancelAnimationFrame(raf);reset();running=true;startTime=performance.now();lastSpawn=startTime;overlay.hidden=true;loop(startTime);}
    function spawn(now){const edge=Math.floor(Math.random()*4),speed=2.2+Math.min(4,(now-startTime)/15000),size=7+Math.random()*10;let x,y;if(edge<2){x=Math.random()*760;y=edge?580:-10}else{x=edge===2?-10:770;y=Math.random()*570}const angle=Math.atan2(player.y-y,player.x-x)+(Math.random()-.5)*.35;rocks.push({x,y,r:size,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,spin:Math.random()*6});}
    function update(now){
      let dx=(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0),dy=(keys.ArrowDown||keys.s?1:0)-(keys.ArrowUp||keys.w?1:0);if(dx&&dy){dx*=.707;dy*=.707}player.x=Math.max(player.r,Math.min(760-player.r,player.x+dx*player.speed));player.y=Math.max(player.r,Math.min(570-player.r,player.y+dy*player.speed));
      if(now-lastSpawn>Math.max(230,760-(now-startTime)/45)){spawn(now);lastSpawn=now;}rocks.forEach(r=>{r.x+=r.vx;r.y+=r.vy;r.spin+=.04;});rocks=rocks.filter(r=>r.x>-50&&r.x<810&&r.y>-50&&r.y<620);
      for(const rock of rocks)if(Math.hypot(rock.x-player.x,rock.y-player.y)<rock.r+player.r-2)return finish(now);
      timeEl.textContent=((now-startTime)/1000).toFixed(1);
    }
    function finish(now){running=false;cancelAnimationFrame(raf);const seconds=((now-startTime)/1000).toFixed(1);titleEl.textContent='Signal lost';messageEl.textContent=`你坚持了 ${seconds} 秒`;startBtn.textContent='Try again';overlay.hidden=false;}
    function draw(now){ctx.fillStyle='#070916';ctx.fillRect(0,0,760,570);stars.forEach(s=>{ctx.globalAlpha=s.a*(.75+.25*Math.sin(now/700+s.x));ctx.fillStyle='#c6d3ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
      const planet=ctx.createRadialGradient(380,285,2,380,285,95);planet.addColorStop(0,'#7b8dff33');planet.addColorStop(1,'transparent');ctx.fillStyle=planet;ctx.beginPath();ctx.arc(380,285,95,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#5c6cb333';ctx.beginPath();ctx.ellipse(380,285,150,58,-.25,0,Math.PI*2);ctx.stroke();
      rocks.forEach(r=>{ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.spin);ctx.shadowBlur=18;ctx.shadowColor='#ff516d';ctx.fillStyle='#ff6078';ctx.beginPath();for(let i=0;i<7;i++){const a=i/7*Math.PI*2,rr=r.r*(i%2?.72:1);ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}ctx.closePath();ctx.fill();ctx.restore();});
      ctx.shadowBlur=25;ctx.shadowColor='#8eeeff';ctx.fillStyle='#d6fbff';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5fdcf3';ctx.beginPath();ctx.arc(player.x-3,player.y-3,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    function loop(now){if(!running)return;update(now);draw(now);raf=requestAnimationFrame(loop);}addEventListener('keydown',e=>{keys[e.key]=true;if(e.key.startsWith('Arrow'))e.preventDefault();});addEventListener('keyup',e=>keys[e.key]=false);startBtn.addEventListener('click',start);reset();draw(0);
  </script>
</body>
</html>
