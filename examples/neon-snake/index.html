<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Neon Snake · DreamCoder</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #effffc; background: radial-gradient(circle at 50% 20%, #183b48, #070a13 58%); }
    .shell { width: min(92vw, 780px); }
    header { display: flex; align-items: end; justify-content: space-between; margin-bottom: 16px; }
    h1 { margin: 0; font-size: clamp(30px, 7vw, 54px); line-height: .9; letter-spacing: -.05em; }
    .sub { margin-top: 8px; color: #72eacb; font-size: 12px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
    .stats { display: flex; gap: 10px; }
    .stat { min-width: 82px; padding: 10px 14px; border: 1px solid #28475a; border-radius: 14px; background: #0b1422cc; text-align: right; }
    .stat span { display: block; color: #7991a2; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }
    .stat strong { font-size: 22px; }
    .stage { position: relative; padding: 14px; border: 1px solid #2d5664; border-radius: 24px; background: #07121dcc; box-shadow: 0 26px 80px #0009, inset 0 0 50px #0de3a40a; }
    canvas { width: 100%; aspect-ratio: 4/3; display: block; border-radius: 14px; background: #050a11; }
    .overlay { position: absolute; inset: 14px; display: grid; place-items: center; border-radius: 14px; background: #03070bd9; text-align: center; transition: .2s; }
    .overlay[hidden] { display: none; }
    .overlay h2 { margin: 0 0 8px; font-size: 38px; }
    .overlay p { color: #9cb1b9; }
    button { border: 0; border-radius: 999px; padding: 12px 22px; color: #04100d; background: #78f7cf; font-weight: 900; cursor: pointer; }
    .help { display: flex; justify-content: space-between; gap: 16px; margin-top: 14px; color: #8799a6; font-size: 13px; }
    kbd { padding: 3px 7px; border: 1px solid #334b58; border-bottom-width: 2px; border-radius: 6px; color: #c8fff0; background: #101c28; }
    a { color: #78f7cf; text-decoration: none; }
    @media (max-width: 560px) { header { align-items: start; } .stats { flex-direction: column; } .stat { padding: 7px 10px; } .help { flex-direction: column; } }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div><h1>Neon<br>Snake</h1><div class="sub">DreamCoder example</div></div>
      <div class="stats"><div class="stat"><span>Score</span><strong id="score">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div></div>
    </header>
    <section class="stage">
      <canvas id="game" width="720" height="540" aria-label="Neon Snake game"></canvas>
      <div class="overlay" id="overlay"><div><h2 id="title">Ready?</h2><p id="message">吃掉光点，不要撞到自己。</p><button id="start">Start game</button></div></div>
    </section>
    <div class="help"><span><kbd>↑↓←→</kbd> / <kbd>WASD</kbd> 移动 · <kbd>Space</kbd> 暂停</span><a href="../index.html">← Example gallery</a></div>
  </main>
  <script>
    const canvas = document.querySelector('#game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.querySelector('#score');
    const bestEl = document.querySelector('#best');
    const overlay = document.querySelector('#overlay');
    const titleEl = document.querySelector('#title');
    const messageEl = document.querySelector('#message');
    const startBtn = document.querySelector('#start');
    const grid = 30, cols = canvas.width / grid, rows = canvas.height / grid;
    let snake, direction, nextDirection, food, score, timer, running = false, paused = false;
    let best = Number(localStorage.getItem('dreamcoder-snake-best') || 0);
    bestEl.textContent = best;

    function randomFood() {
      let point;
      do point = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
      while (snake.some(part => part.x === point.x && part.y === point.y));
      return point;
    }

    function reset() {
      snake = [{x: 7, y: 9}, {x: 6, y: 9}, {x: 5, y: 9}];
      direction = nextDirection = {x: 1, y: 0};
      score = 0; scoreEl.textContent = score; food = randomFood(); paused = false;
    }

    function start() {
      clearInterval(timer); reset(); running = true; overlay.hidden = true;
      timer = setInterval(tick, 105); draw();
    }

    function tick() {
      if (!running || paused) return;
      direction = nextDirection;
      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
      if (head.x < 0 || head.y < 0 || head.x >= cols || head.y >= rows || snake.some(p => p.x === head.x && p.y === head.y)) return gameOver();
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10; scoreEl.textContent = score; food = randomFood();
      } else snake.pop();
      draw();
    }

    function gameOver() {
      running = false; clearInterval(timer);
      if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('dreamcoder-snake-best', best); }
      titleEl.textContent = 'Game over'; messageEl.textContent = `本局 ${score} 分，再来一次？`; startBtn.textContent = 'Restart'; overlay.hidden = false;
    }

    function draw() {
      ctx.fillStyle = '#050a11'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#0d1b25'; ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += grid) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
      for (let y = 0; y <= canvas.height; y += grid) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
      ctx.shadowBlur = 24; ctx.shadowColor = '#ff5e8a'; ctx.fillStyle = '#ff6c95';
      ctx.beginPath(); ctx.arc(food.x*grid+grid/2, food.y*grid+grid/2, 8, 0, Math.PI*2); ctx.fill();
      snake.forEach((part, i) => {
        ctx.shadowColor = '#52f5c4'; ctx.shadowBlur = i === 0 ? 20 : 8;
        ctx.fillStyle = i === 0 ? '#b5ffe9' : `hsl(${158 - i*2} 78% ${55 - Math.min(i,12)}%)`;
        const inset = i === 0 ? 3 : 5; ctx.fillRect(part.x*grid+inset, part.y*grid+inset, grid-inset*2, grid-inset*2);
      });
      ctx.shadowBlur = 0;
    }

    const directions = {ArrowUp:[0,-1],w:[0,-1],ArrowDown:[0,1],s:[0,1],ArrowLeft:[-1,0],a:[-1,0],ArrowRight:[1,0],d:[1,0]};
    addEventListener('keydown', event => {
      if (event.code === 'Space' && running) { event.preventDefault(); paused = !paused; titleEl.textContent = 'Paused'; messageEl.textContent = '按空格继续'; startBtn.textContent = 'Resume'; overlay.hidden = !paused; return; }
      if (event.code === 'Space' && paused) return;
      const value = directions[event.key]; if (!value) return; event.preventDefault();
      if (value[0] !== -direction.x || value[1] !== -direction.y) nextDirection = {x:value[0], y:value[1]};
    });
    startBtn.addEventListener('click', () => { if (paused) { paused = false; overlay.hidden = true; } else start(); });
    reset(); draw();
  </script>
</body>
</html>
