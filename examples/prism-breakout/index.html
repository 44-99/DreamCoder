<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Prism Breakout · DreamCoder</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; color:#faf6ff; background:radial-gradient(circle at 30% 10%,#46244f,#090817 58%); }
    .shell { width:min(92vw,820px); }
    header { display:flex; justify-content:space-between; align-items:end; margin-bottom:16px; }
    h1 { margin:0; font-size:clamp(34px,7vw,58px); letter-spacing:-.05em; line-height:.9; }
    .label { color:#cf8cff; font-size:12px; font-weight:900; letter-spacing:.16em; text-transform:uppercase; margin-top:8px; }
    .hud { display:flex; gap:20px; color:#a99cbd; font-size:13px; } .hud strong { display:block; color:white; font-size:24px; text-align:right; }
    .stage { position:relative; padding:14px; border:1px solid #58336b; border-radius:24px; background:#0a0715; box-shadow:0 28px 90px #0009; }
    canvas { display:block; width:100%; aspect-ratio:4/3; border-radius:14px; background:#090713; cursor:none; }
    .overlay { position:absolute; inset:14px; display:grid; place-items:center; border-radius:14px; background:#080510df; text-align:center; }
    .overlay[hidden] { display:none; } .overlay h2 { margin:0; font-size:42px; } .overlay p { color:#b8a9c8; }
    button { border:0; border-radius:999px; padding:12px 23px; color:#18051e; background:linear-gradient(90deg,#ff8bd8,#a98bff); font-weight:900; cursor:pointer; }
    .help { margin-top:14px; display:flex; justify-content:space-between; color:#9287a4; font-size:13px; } a { color:#e6a8ff; text-decoration:none; }
  </style>
</head>
<body>
  <main class="shell">
    <header><div><h1>Prism<br>Breakout</h1><div class="label">DreamCoder example</div></div><div class="hud"><div>Score<strong id="score">0</strong></div><div>Lives<strong id="lives">3</strong></div></div></header>
    <section class="stage"><canvas id="game" width="760" height="570" aria-label="Prism Breakout game"></canvas><div class="overlay" id="overlay"><div><h2 id="title">Break the light</h2><p id="message">鼠标、A/D 或方向键移动挡板。</p><button id="start">Start game</button></div></div></section>
    <div class="help"><span>Mouse · A/D · ←/→</span><a href="../index.html">← Example gallery</a></div>
  </main>
  <script>
    const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d'),overlay=document.querySelector('#overlay');
    const scoreEl=document.querySelector('#score'),livesEl=document.querySelector('#lives'),titleEl=document.querySelector('#title'),messageEl=document.querySelector('#message'),startBtn=document.querySelector('#start');
    let paddle,ball,bricks,score,lives,running=false,keys={},raf;
    const palette=['#ff72b6','#d884ff','#8c92ff','#5ed9f5','#5ff1bf'];
    function buildBricks(){ return Array.from({length:5},(_,r)=>Array.from({length:9},(_,c)=>({x:35+c*77,y:48+r*36,w:65,h:22,color:palette[r],alive:true}))).flat(); }
    function resetBall(){ ball={x:380,y:455,vx:(Math.random()>.5?1:-1)*4.2,vy:-5,r:9}; paddle={x:320,y:510,w:120,h:13}; }
    function reset(){ score=0;lives=3;bricks=buildBricks();scoreEl.textContent=0;livesEl.textContent=3;resetBall(); }
    function start(){ cancelAnimationFrame(raf);reset();running=true;overlay.hidden=true;loop(); }
    function roundLost(){ lives--;livesEl.textContent=lives;if(lives<=0)return finish(false);resetBall(); }
    function finish(won){ running=false;cancelAnimationFrame(raf);titleEl.textContent=won?'You win!':'Out of light';messageEl.textContent=`最终得分 ${score}`;startBtn.textContent='Play again';overlay.hidden=false; }
    function update(){
      if(keys.ArrowLeft||keys.a)paddle.x-=8;if(keys.ArrowRight||keys.d)paddle.x+=8;paddle.x=Math.max(10,Math.min(canvas.width-paddle.w-10,paddle.x));
      ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<ball.r||ball.x>canvas.width-ball.r)ball.vx*=-1;if(ball.y<ball.r)ball.vy*=-1;if(ball.y>canvas.height+20)return roundLost();
      if(ball.vy>0&&ball.y+ball.r>=paddle.y&&ball.y-ball.r<=paddle.y+paddle.h&&ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w){ball.y=paddle.y-ball.r;ball.vy=-Math.abs(ball.vy);ball.vx+=(ball.x-(paddle.x+paddle.w/2))/22;}
      for(const brick of bricks){if(!brick.alive)continue;if(ball.x+ball.r>brick.x&&ball.x-ball.r<brick.x+brick.w&&ball.y+ball.r>brick.y&&ball.y-ball.r<brick.y+brick.h){brick.alive=false;ball.vy*=-1;score+=10;scoreEl.textContent=score;break;}}
      if(bricks.every(b=>!b.alive))finish(true);
    }
    function draw(){
      ctx.fillStyle='#090713';ctx.fillRect(0,0,canvas.width,canvas.height);
      const glow=ctx.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,100);glow.addColorStop(0,'#ffffff20');glow.addColorStop(1,'transparent');ctx.fillStyle=glow;ctx.fillRect(0,0,canvas.width,canvas.height);
      bricks.forEach(b=>{if(!b.alive)return;ctx.shadowBlur=15;ctx.shadowColor=b.color;ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#ffffff55';ctx.fillRect(b.x+4,b.y+3,b.w-8,3);});
      ctx.shadowColor='#c894ff';ctx.shadowBlur=22;ctx.fillStyle='#f4d8ff';ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
      ctx.shadowColor='#fff';ctx.shadowBlur=28;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
    function loop(){if(!running)return;update();draw();raf=requestAnimationFrame(loop);}
    addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});addEventListener('keyup',e=>keys[e.key]=false);
    canvas.addEventListener('pointermove',e=>{const rect=canvas.getBoundingClientRect();paddle.x=(e.clientX-rect.left)*canvas.width/rect.width-paddle.w/2;});startBtn.addEventListener('click',start);
    reset();draw();
  </script>
</body>
</html>
